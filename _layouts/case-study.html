---
layout: default
---

<div class="container container-cs">
  <a href="/" class="title-back-link"><span class="fa fa-angle-double-left"></span>back to home</a>
  <div class="hero-image" style="background-image:url('/assets/images/cs/{{ page.project-image }}');">
    <div class="hero-content">
      <h1>{{ page.project-title }}</h1>
      <div class="separator">
        <i class="fa fa-ellipsis-h"></i>
      </div>
      <p>{{ page.project-blurb }}</p>
    </div>
    <div class="hero-mask"></div>
  </div>


  <div class="container-cs-content">
    <div class="cs-details">
      <div class="row">
        <div class="col cs-details-item">
          <h2>Client</h2>
          <p>{{ page.project-title }}</p>
        </div>
        <div class="col cs-details-item">
          <h2>URL</h2>
          <p><a href="{{ page.project-url }}" target="_blank">{{ page.project-url }}</a></p>
        </div>
        <div class="col cs-details-item">
          <h2>Technology</h2>
          <p>{{ page.project-tech }}</p>
        </div>
        <div class="col cs-details-item">
          <h2>Project Type</h2>
          <p>{{ page.project-type }}</p>
        </div>
      </div>
    </div>
    {{ content }}
  </div>
</div>
