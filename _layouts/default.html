<!doctype html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} || {% if page.layout == 'post' %}Notes to self ::{% endif %} {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv=”last-modified” content=”{{ 'now' | date: '%Y-%m-%d' }}”>
    <meta name="description" content="" />
    <link rel="stylesheet" href="/assets/css/main.css" media="screen" />
    <link rel="stylesheet" href="/assets/css/main.css" media="print" />
    <link rel="icon" type="image/png" href="{{ site.baseurl }}favicon.ico" />
  </head>
  <body class="{{ layout.class }}">
    {{ content }}
  </body>
</html>
